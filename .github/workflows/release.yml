name: Release and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # for tag + changelog commit push
  issues: write         # for release notes linking
  pull-requests: write  # for release notes linking

# Prevent two concurrent release runs from racing on tags. cancel-in-progress
# is false so an in-flight deploy completes rather than getting killed.
concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # semantic-release walks history to find the previous tag.
          fetch-depth: 0
          # Persist the release bot token (not the default GITHUB_TOKEN) so
          # the @semantic-release/git push of the changelog commit
          # authenticates as an identity allowed to write to main.
          persist-credentials: true
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          # SEMANTIC_RELEASE_TOKEN must act as a repo ADMIN: main requires 4
          # status checks (Lint + format / Test / govulncheck / Conventional
          # commit PR title) and a freshly pushed release commit has none.
          # Because branch protection has enforce_admins=false, an admin
          # identity's push bypasses them — the default github-actions[bot]
          # GITHUB_TOKEN is not an admin, so it gets rejected (GH006).
          # Use a fine-grained PAT (Contents: write) from an owner/admin
          # account, stored as the SEMANTIC_RELEASE_TOKEN secret. The git
          # commit message carries [skip ci] (see release.config.js) so this
          # push to main doesn't trigger a second, no-op release run.
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

  # Build the api image on the GitHub runner and push it to ECR under the
  # released version tag. The EC2 host pulls this same tag at deploy time,
  # so the build environment is consistent across releases and divorced
  # from the host's disk pressure.
  build_and_push:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    # The EC2 host is Graviton (arm64). Build natively on a GitHub-hosted
    # ARM runner so the image's only manifest is linux/arm64 — same cost
    # as x86, no QEMU emulation overhead.
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write # mint the OIDC token for configure-aws-credentials
      contents: read # checkout of the released tag
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the exact released tag, not the moving HEAD of main.
          ref: v${{ needs.release.outputs.new_release_version }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: us-east-2

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Repo is configured IMMUTABLE in terraform, so this tag can
          # only be pushed once. A re-run of release.yml against an
          # existing version will fail at push — intended safeguard.
          tags: ${{ steps.ecr-login.outputs.registry }}/prog-strength-prod/api:v${{ needs.release.outputs.new_release_version }}
          # Baked into the Go binary via -ldflags in the Dockerfile.
          build-args: |
            APP_VERSION=v${{ needs.release.outputs.new_release_version }}
          # Reuse layers across releases. Cheap to enable, big cold-runner win.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [release, build_and_push]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy tagged version to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
          # Google Calendar sync. Both must be set for the calendar OAuth /
          # connection routes to mount (server.go gates on them); missing
          # secrets deploy as empty strings and the feature stays dormant —
          # the rest of planned-workouts is unaffected.
          GOOGLE_CALENDAR_REDIRECT_URL: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URL }}
          CALENDAR_TOKEN_ENC_KEY: ${{ secrets.CALENDAR_TOKEN_ENC_KEY }}
          DEV_AUTH: ${{ secrets.DEV_AUTH }}
          CORS_ALLOWED_ORIGIN: ${{ secrets.CORS_ALLOWED_ORIGIN }}
          LITESTREAM_REPLICA_BUCKET: ${{ secrets.LITESTREAM_REPLICA_BUCKET }}
          LITESTREAM_REPLICA_REGION: ${{ secrets.LITESTREAM_REPLICA_REGION }}
          TCX_BUCKET_NAME: ${{ secrets.TCX_BUCKET_NAME }}
          AVATAR_BUCKET_NAME: ${{ secrets.AVATAR_BUCKET_NAME }}
          RETURN_TO_ALLOWED_ORIGINS: ${{ secrets.RETURN_TO_ALLOWED_ORIGINS }}
          BETA_ALLOWED_EMAILS: ${{ secrets.BETA_ALLOWED_EMAILS }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          # Grafana admin credentials. Both seed the initial values on
          # first boot; subsequent UI password changes persist in
          # grafana_data. Unset secrets fall through to the compose
          # file's "admin"/"admin" defaults — fine for dev, do not
          # leave that way in prod.
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          # Nutrition lookup providers (GET /nutrition/lookup). All
          # optional — missing secrets deploy as empty strings and the
          # endpoint degrades to 503 lookup_unavailable. See
          # prog-strength-docs/sows/custom-meal-macro-accuracy.md.
          FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
          FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
          USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
          RELEASE_VERSION: ${{ needs.release.outputs.new_release_version }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: JWT_SIGNING_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URL,GOOGLE_CALENDAR_REDIRECT_URL,CALENDAR_TOKEN_ENC_KEY,DEV_AUTH,CORS_ALLOWED_ORIGIN,LITESTREAM_REPLICA_BUCKET,LITESTREAM_REPLICA_REGION,TCX_BUCKET_NAME,AVATAR_BUCKET_NAME,RETURN_TO_ALLOWED_ORIGINS,BETA_ALLOWED_EMAILS,ADMIN_EMAILS,GRAFANA_ADMIN_USER,GRAFANA_ADMIN_PASSWORD,FATSECRET_CLIENT_ID,FATSECRET_CLIENT_SECRET,USDA_FDC_API_KEY,RELEASE_VERSION
          script: |
            # Abort on the first failing command. Without this, a failed
            # docker compose call is followed by trailing `ps`/`logs`
            # calls that succeed, and the script's exit code is the last
            # command's — appleboy/ssh-action would then report green on
            # a real failure.
            set -e

            # All compose / Caddy / monitoring config lives in the infra
            # repo. The api repo isn't checked out on the host anymore;
            # the released image comes from ECR (see below).
            cd /home/ubuntu/prog-strength-infra
            git fetch --prune
            git checkout main
            git pull --ff-only

            cd compose/api

            # Authenticate docker to ECR using the instance role. awscli
            # is installed by bootstrap.sh and reads creds from the EC2
            # metadata service, so no static keys flow through the runner.
            ECR_REGISTRY="$(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-2.amazonaws.com"
            aws ecr get-login-password --region us-east-2 \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # Write .env from secrets forwarded over SSH. docker compose
            # reads .env from the project directory (this one, the dir of
            # the first -f compose file). ECR_REGISTRY + APP_VERSION
            # resolve the image: line in docker-compose.yml.
            umask 077
            cat > .env <<EOF
            JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
            GOOGLE_CALENDAR_REDIRECT_URL=${GOOGLE_CALENDAR_REDIRECT_URL}
            CALENDAR_TOKEN_ENC_KEY=${CALENDAR_TOKEN_ENC_KEY}
            DEV_AUTH=${DEV_AUTH}
            CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN}
            LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
            LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION}
            TCX_BUCKET_NAME=${TCX_BUCKET_NAME}
            AVATAR_BUCKET_NAME=${AVATAR_BUCKET_NAME}
            RETURN_TO_ALLOWED_ORIGINS=${RETURN_TO_ALLOWED_ORIGINS}
            BETA_ALLOWED_EMAILS=${BETA_ALLOWED_EMAILS}
            ADMIN_EMAILS=${ADMIN_EMAILS}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            FATSECRET_CLIENT_ID=${FATSECRET_CLIENT_ID}
            FATSECRET_CLIENT_SECRET=${FATSECRET_CLIENT_SECRET}
            USDA_FDC_API_KEY=${USDA_FDC_API_KEY}
            AWS_REGION=us-east-2
            APP_VERSION=v${RELEASE_VERSION}
            ECR_REGISTRY=${ECR_REGISTRY}
            EOF

            # Merge the monitoring stack. -f flags read in order; services
            # from both files land in one project on the shared
            # `prog-strength` network so Prometheus can scrape api +
            # agent by service hostname. The compose file pins
            # `name: prog-strength-api` so the project name is stable.
            COMPOSE_FILES=(-f docker-compose.yml -f /home/ubuntu/prog-strength-infra/monitoring/docker-compose.monitoring.yml)

            # Pull the released image up-front so a missing/broken push
            # surfaces before we tear down the running stack.
            docker compose "${COMPOSE_FILES[@]}" pull api
            docker compose "${COMPOSE_FILES[@]}" down
            docker compose "${COMPOSE_FILES[@]}" up -d

            echo "Deployed v${RELEASE_VERSION}"
            docker compose "${COMPOSE_FILES[@]}" ps
            docker compose "${COMPOSE_FILES[@]}" logs --tail=50
