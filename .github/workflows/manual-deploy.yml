name: Manual Deploy

# Operator-initiated deploy of an existing tag. Use this when release.yml
# can't help — primarily when prog-strength-infra has provisioned a fresh
# EC2 host and you need to bring services up against the currently-released
# version without manufacturing a fake feat/fix commit just to trigger
# semantic-release. The deploy logic is intentionally a copy of the deploy
# job in release.yml; keep them in sync until they're worth refactoring
# into a reusable workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to deploy (e.g. 0.4.1 or v0.4.1). Leave blank for the latest tag.'
        required: false
        default: ''

permissions:
  contents: read

# Share the concurrency group with release.yml so a manual deploy can't
# race with an automatic release+deploy.
concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + all tags so `git tag --sort=-version:refname`
          # below can find the latest released version.
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          set -e
          v_input='${{ inputs.version }}'
          if [ -n "$v_input" ]; then
            v="$v_input"
          else
            v="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          fi
          if [ -z "$v" ]; then
            echo "No version provided and no v* tags found in the repository."
            exit 1
          fi
          # Normalize to "0.4.1" (no leading v); the SSM step below passes it
          # as v${RELEASE_VERSION}, matching release.yml's version shape.
          v="${v#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$v"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: us-east-2

      - name: Deploy tagged version via SSM Run Command
        env:
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail

          # Invoke the versioned on-host deploy script via SSM Run Command —
          # no SSH, no inbound port 22. The host is targeted by its Name tag
          # (survives an instance replacement, so no EC2_HOST). The script
          # reads app secrets from Secrets Manager via the instance role, so
          # only the non-secret version tag travels with the command. Run as
          # the ubuntu user so the infra checkout + docker creds keep their
          # ownership.
          # Pull guard: bring the infra checkout up to date BEFORE invoking the
          # on-host deploy script, so a missing/stale deploy/api.sh — e.g. the
          # first deploy after a new on-host script merges — can't fail the
          # release. The && chain fails fast: a failed pull never runs a stale
          # script, and its non-zero exit surfaces as an SSM Failed status.
          # api.sh self-updates too; this is the bootstrap belt-and-braces.
          # jq builds the params so the embedded quotes survive the CLI parser.
          remote_params="$(jq -n --arg c \
            "sudo -u ubuntu -H bash -c 'cd /home/ubuntu/prog-strength-infra && git fetch --prune && git checkout main && git pull --ff-only && bash deploy/api.sh v${RELEASE_VERSION}'" \
            '{commands: [$c]}')"

          command_id="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --comment "Deploy api v${RELEASE_VERSION}" \
            --targets "Key=tag:Name,Values=prog-strength-prod-backend" \
            --parameters "${remote_params}" \
            --query 'Command.CommandId' --output text)"
          echo "SSM command dispatched: ${command_id}"

          instance_id=""
          for _ in $(seq 1 30); do
            instance_id="$(aws ssm list-command-invocations \
              --command-id "${command_id}" \
              --query 'CommandInvocations[0].InstanceId' --output text)"
            [ -n "${instance_id}" ] && [ "${instance_id}" != "None" ] && break
            sleep 2
          done
          if [ -z "${instance_id}" ] || [ "${instance_id}" = "None" ]; then
            echo "No SSM invocation registered for command ${command_id}" >&2
            exit 1
          fi
          echo "Running on instance: ${instance_id}"

          # Poll to completion so the workflow reflects the real deploy exit
          # status (the guarantee set -e gave over SSH).
          while true; do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" --instance-id "${instance_id}" \
              --query 'Status' --output text)"
            case "${status}" in
              Success) break ;;
              Pending | InProgress | Delayed) sleep 5 ;;
              *)
                echo "Deploy failed with status: ${status}" >&2
                aws ssm get-command-invocation \
                  --command-id "${command_id}" --instance-id "${instance_id}" \
                  --query 'StandardErrorContent' --output text >&2 || true
                aws ssm get-command-invocation \
                  --command-id "${command_id}" --instance-id "${instance_id}" \
                  --query 'StandardOutputContent' --output text || true
                exit 1
                ;;
            esac
          done

          echo "Deploy succeeded."
          aws ssm get-command-invocation \
            --command-id "${command_id}" --instance-id "${instance_id}" \
            --query 'StandardOutputContent' --output text
