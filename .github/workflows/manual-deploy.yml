name: Manual Deploy

# Operator-initiated deploy of an existing tag. Use this when release.yml
# can't help — primarily when prog-strength-infra has provisioned a fresh
# EC2 host and you need to bring services up against the currently-released
# version without manufacturing a fake feat/fix commit just to trigger
# semantic-release. The deploy logic is intentionally a copy of the deploy
# job in release.yml; keep them in sync until they're worth refactoring
# into a reusable workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to deploy (e.g. 0.4.1 or v0.4.1). Leave blank for the latest tag.'
        required: false
        default: ''

permissions:
  contents: read

# Share the concurrency group with release.yml so a manual deploy can't
# race with an automatic release+deploy.
concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + all tags so `git tag --sort=-version:refname`
          # below can find the latest released version.
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          set -e
          v_input='${{ inputs.version }}'
          if [ -n "$v_input" ]; then
            v="$v_input"
          else
            v="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          fi
          if [ -z "$v" ]; then
            echo "No version provided and no v* tags found in the repository."
            exit 1
          fi
          # Normalize to "0.4.1" (no leading v) so the env-substitution in
          # the SSH script below matches release.yml's RELEASE_VERSION shape.
          v="${v#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$v"

      - name: Deploy tagged version to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Only true secrets, Terraform-owned identities, PII, and deploy
          # orchestration are forwarded now. Non-secret app config lives in
          # config.toml in this repo — see
          # prog-strength-docs/sows/centralized-api-config.md.
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CALENDAR_TOKEN_ENC_KEY: ${{ secrets.CALENDAR_TOKEN_ENC_KEY }}
          LITESTREAM_REPLICA_BUCKET: ${{ secrets.LITESTREAM_REPLICA_BUCKET }}
          LITESTREAM_REPLICA_REGION: ${{ secrets.LITESTREAM_REPLICA_REGION }}
          # Terraform-owned bucket identities (config.toml references these as
          # ${VAR} labels; the values stay env-sourced).
          TCX_BUCKET_NAME: ${{ secrets.TCX_BUCKET_NAME }}
          AVATAR_BUCKET_NAME: ${{ secrets.AVATAR_BUCKET_NAME }}
          # PII (real email addresses) — kept env-sourced, never committed to
          # the public config.toml.
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          # See release.yml for rationale — same secrets here so manual
          # redeploys don't drop back to "admin"/"admin" Grafana creds.
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          # Nutrition lookup providers — MUST stay in lockstep with
          # release.yml: this workflow rewrites the host .env wholesale,
          # so any secret missing here gets CLOBBERED on manual deploys
          # (which is exactly how the lookup providers went dark on
          # 2026-06-12 minutes after a release had set them).
          FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
          FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
          USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
          # Agent Vector Memory provider keys (config.toml [vectormemory]
          # ${VAR} labels). Optional until that feature ships.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: JWT_SIGNING_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,CALENDAR_TOKEN_ENC_KEY,LITESTREAM_REPLICA_BUCKET,LITESTREAM_REPLICA_REGION,TCX_BUCKET_NAME,AVATAR_BUCKET_NAME,ADMIN_EMAILS,GRAFANA_ADMIN_USER,GRAFANA_ADMIN_PASSWORD,FATSECRET_CLIENT_ID,FATSECRET_CLIENT_SECRET,USDA_FDC_API_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY,RELEASE_VERSION
          script: |
            # Abort on the first failing command — see release.yml for the
            # full rationale on why this matters with appleboy/ssh-action.
            set -e

            # All compose / Caddy / monitoring config lives in the infra
            # repo. The api repo isn't checked out on the host anymore;
            # the image at this tag must already exist in ECR.
            cd /home/ubuntu/prog-strength-infra
            git fetch --prune
            git checkout main
            git pull --ff-only

            cd compose/api

            # ECR login via the instance role (see release.yml).
            ECR_REGISTRY="$(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-2.amazonaws.com"
            aws ecr get-login-password --region us-east-2 \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            umask 077
            cat > .env <<EOF
            JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            CALENDAR_TOKEN_ENC_KEY=${CALENDAR_TOKEN_ENC_KEY}
            LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
            LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION}
            TCX_BUCKET_NAME=${TCX_BUCKET_NAME}
            AVATAR_BUCKET_NAME=${AVATAR_BUCKET_NAME}
            ADMIN_EMAILS=${ADMIN_EMAILS}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            FATSECRET_CLIENT_ID=${FATSECRET_CLIENT_ID}
            FATSECRET_CLIENT_SECRET=${FATSECRET_CLIENT_SECRET}
            USDA_FDC_API_KEY=${USDA_FDC_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            AWS_REGION=us-east-2
            APP_VERSION=v${RELEASE_VERSION}
            ECR_REGISTRY=${ECR_REGISTRY}
            EOF

            # Merge the monitoring stack from prog-strength-infra into
            # the same compose project (same pattern as release.yml).
            COMPOSE_FILES=(-f docker-compose.yml -f /home/ubuntu/prog-strength-infra/monitoring/docker-compose.monitoring.yml)

            docker compose "${COMPOSE_FILES[@]}" pull api
            docker compose "${COMPOSE_FILES[@]}" down
            docker compose "${COMPOSE_FILES[@]}" up -d

            echo "Deployed v${RELEASE_VERSION}"
            docker compose "${COMPOSE_FILES[@]}" ps
            docker compose "${COMPOSE_FILES[@]}" logs --tail=50
