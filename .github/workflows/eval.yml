# Macro-accuracy eval for API PRs: the nutrition lookup service (and
# its durable cache) live here, so changes to them can move the
# agent's custom-meal estimation accuracy. PRs touching those paths
# run the agent repo's reusable eval against THIS PR's API checkout
# and get the same sticky comparison comment as agent/mcp PRs.
#
# Requires repo secrets: ANTHROPIC_API_KEY (and optionally the
# FATSECRET_*/USDA_FDC_API_KEY provider keys).
# See prog-strength-docs/sows/custom-meal-macro-accuracy.md.
name: Macro Eval

on:
  pull_request:
    paths:
      - "internal/nutritionlookup/**"
      - "internal/nutrition/**"
      - "internal/db/migrations/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: macro-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'eval:skip') }}
    uses: Prog-Strength/prog-strength-agent/.github/workflows/eval-reusable.yml@main
    with:
      api_ref: ${{ github.event.pull_request.head.sha }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
      FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
      USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
